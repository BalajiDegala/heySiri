<!DOCTYPE html>
<html>
<head>
    <title>heysiri Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #1e3a8a, #9333ea);
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            color: white;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            cursor: pointer;
        }

        h2 {
            margin-bottom: 20px;
        }

        .error {
            color: #ff6b6b;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="glass">
    <h2>heysiri</h2>
    <p>Plan it. Track it. Reflect it.</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="password" name="password" placeholder="Team Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
