<!DOCTYPE html>
<html>
<head>
    <title>heysiri Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --page: #dbe7f8;
            --card: #96b5ee;
            --card-line: rgba(75, 102, 157, 0.18);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.78);
            --field: rgba(255, 255, 255, 0.72);
            --field-text: #20324d;
            --button: #063a86;
            --button-hover: #073477;
            --ring-a: #9bbcf3;
            --ring-b: #1f55da;
            --ring-c: #153eaf;
            --error-bg: rgba(155, 45, 59, 0.12);
            --error-text: #ffffff;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Arial, sans-serif;
            background: var(--page);
            color: var(--text);
            overflow: hidden;
        }

        .cloud-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bird-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .cloud {
            position: absolute;
            width: var(--w);
            height: calc(var(--w) * 0.46);
            left: -28vw;
            top: var(--top);
            opacity: var(--opacity);
            filter: drop-shadow(0 14px 18px rgba(103, 130, 174, 0.14));
            animation: cloudDrift var(--duration) linear infinite;
            animation-delay: var(--delay);
            background:
                radial-gradient(circle at 18% 60%, rgba(255, 255, 255, 0.98) 0 17%, transparent 18%),
                radial-gradient(circle at 34% 42%, rgba(255, 255, 255, 1) 0 24%, transparent 25%),
                radial-gradient(circle at 52% 48%, rgba(255, 255, 255, 1) 0 26%, transparent 27%),
                radial-gradient(circle at 70% 54%, rgba(255, 255, 255, 0.98) 0 20%, transparent 21%),
                radial-gradient(circle at 84% 64%, rgba(255, 255, 255, 0.92) 0 14%, transparent 15%),
                radial-gradient(ellipse at 50% 72%, rgba(255, 255, 255, 0.90) 0 42%, transparent 43%);
            background-repeat: no-repeat;
            background-size: 100% 100%;
        }

        .cloud::before,
        .cloud::after {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            border-radius: 999px;
            pointer-events: none;
        }

        .cloud::before {
            top: 48%;
            height: 20%;
            background: rgba(255, 255, 255, 0.82);
            filter: blur(4px);
        }

        .cloud::after {
            top: 62%;
            height: 14%;
            background: rgba(255, 255, 255, 0.58);
            filter: blur(7px);
        }

        .bird {
            position: absolute;
            left: -12vw;
            top: var(--top);
            width: var(--size);
            height: calc(var(--size) * 0.45);
            opacity: var(--opacity);
            transform: scale(var(--scale));
            animation: birdFly var(--duration) linear infinite;
            animation-delay: var(--delay);
            filter: drop-shadow(0 5px 5px rgba(36, 65, 110, 0.16));
        }

        .bird::before,
        .bird::after {
            content: "";
            position: absolute;
            top: 35%;
            width: 52%;
            height: 58%;
            border-top: max(2px, calc(var(--size) * 0.08)) solid rgba(18, 51, 100, 0.76);
            border-radius: 50% 50% 0 0;
        }

        .bird::before {
            left: 0;
            transform-origin: right center;
            animation: leftWing 0.78s ease-in-out infinite;
        }

        .bird::after {
            right: 0;
            transform-origin: left center;
            animation: rightWing 0.78s ease-in-out infinite;
        }

        .welcome-screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 44%, rgba(255, 255, 255, 0.26), transparent 24%),
                linear-gradient(135deg, #dbe7f8 0%, #b8cff6 48%, #8fb0ec 100%);
            animation: welcomeExit 0.8s ease 2.7s forwards;
        }

        .welcome-inner {
            position: relative;
            width: min(520px, calc(100vw - 36px));
            min-height: 220px;
            display: grid;
            place-items: center;
            text-align: center;
        }

        .welcome-word {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            text-shadow: 0 10px 24px rgba(15, 51, 106, 0.22);
        }

        .welcome-word strong {
            display: block;
            font-size: clamp(42px, 8vw, 86px);
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0.01em;
        }

        .welcome-word span {
            display: block;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.84);
            font-size: 16px;
            font-weight: 800;
        }

        .welcome-hello {
            animation: helloSlide 2.7s ease forwards;
        }

        .welcome-access {
            opacity: 0;
            transform: translateY(24px);
            animation: accessSlide 2.7s ease forwards;
        }

        .login-page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: min(330px, calc(100vw - 52px));
            min-height: 0;
            padding: 36px 34px 30px;
            border-radius: 8px;
            border: 1px solid var(--card-line);
            background: var(--card);
            box-shadow: 0 10px 20px rgba(65, 93, 151, 0.22);
            opacity: 0;
            transform: translateY(18px);
            animation: loginReveal 0.7s ease 3.05s forwards;
        }

        .brand {
            margin: 0 0 32px;
            text-align: center;
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
            font-weight: 900;
            color: var(--text);
        }

        .brand p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        input {
            width: 100%;
            min-height: 36px;
            border: 0;
            border-radius: 6px;
            padding: 10px 13px;
            background: var(--field);
            color: var(--field-text);
            font: inherit;
            font-size: 13px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
        }

        input::placeholder {
            color: rgba(32, 50, 77, 0.45);
        }

        input:focus {
            outline: 3px solid rgba(6, 58, 134, 0.18);
        }

        button {
            width: 100%;
            min-height: 40px;
            margin-top: 2px;
            border: 0;
            border-radius: 0;
            background: var(--button);
            color: #ffffff;
            cursor: pointer;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow: 0 8px 16px rgba(6, 58, 134, 0.18);
        }

        button:hover {
            background: var(--button-hover);
        }

        .error {
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 6px;
            background: var(--error-bg);
            color: var(--error-text);
            font-weight: 800;
            font-size: 12px;
        }

        @keyframes helloSlide {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            14%,
            36% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            48%,
            100% {
                opacity: 0;
                transform: translateY(-24px) scale(0.98);
            }
        }

        @keyframes accessSlide {
            0%,
            42% {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }

            58%,
            84% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-18px) scale(0.99);
            }
        }

        @keyframes welcomeExit {
            to {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        }

        @keyframes loginReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cloudDrift {
            from {
                transform: translateX(0) scale(var(--scale));
            }

            to {
                transform: translateX(150vw) scale(var(--scale));
            }
        }

        @keyframes birdFly {
            from {
                transform: translateX(0) translateY(0) scale(var(--scale));
            }

            50% {
                transform: translateX(58vw) translateY(var(--lift)) scale(var(--scale));
            }

            to {
                transform: translateX(126vw) translateY(0) scale(var(--scale));
            }
        }

        @keyframes leftWing {
            0%,
            100% {
                transform: rotate(24deg);
            }

            50% {
                transform: rotate(-8deg) translateY(-2px);
            }
        }

        @keyframes rightWing {
            0%,
            100% {
                transform: rotate(-24deg);
            }

            50% {
                transform: rotate(8deg) translateY(-2px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .welcome-screen {
                display: none;
            }

            .cloud {
                animation: none;
            }

            .bird {
                animation: none;
            }

            .login-card {
                opacity: 1;
                transform: none;
                animation: none;
            }
        }

        @media (max-width: 760px) {
            .login-page {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
<div class="cloud-layer" aria-hidden="true">
    <div class="cloud" style="--top: 8vh; --w: 230px; --opacity: 0.96; --duration: 34s; --delay: -4s; --scale: 0.95;"></div>
    <div class="cloud" style="--top: 24vh; --w: 290px; --opacity: 0.86; --duration: 42s; --delay: -18s; --scale: 1.08;"></div>
    <div class="cloud" style="--top: 61vh; --w: 250px; --opacity: 0.88; --duration: 38s; --delay: -12s; --scale: 1;"></div>
    <div class="cloud" style="--top: 74vh; --w: 330px; --opacity: 0.76; --duration: 48s; --delay: -26s; --scale: 1.16;"></div>
    <div class="cloud" style="--top: 40vh; --w: 210px; --opacity: 0.74; --duration: 32s; --delay: -20s; --scale: 0.84;"></div>
    <div class="cloud" style="--top: 18vh; --w: 200px; --opacity: 0.82; --duration: 36s; --delay: -31s; --scale: 0.9;"></div>
    <div class="cloud" style="--top: 52vh; --w: 230px; --opacity: 0.78; --duration: 40s; --delay: -34s; --scale: 0.96;"></div>
</div>

<div class="bird-layer" aria-hidden="true">
    <div class="bird" style="--top: 13vh; --size: 46px; --opacity: 0.82; --duration: 22s; --delay: -3s; --scale: 0.92; --lift: -16px;"></div>
    <div class="bird" style="--top: 18vh; --size: 34px; --opacity: 0.66; --duration: 28s; --delay: -13s; --scale: 0.72; --lift: 10px;"></div>
    <div class="bird" style="--top: 27vh; --size: 38px; --opacity: 0.70; --duration: 25s; --delay: -8s; --scale: 0.80; --lift: -10px;"></div>
    <div class="bird" style="--top: 34vh; --size: 30px; --opacity: 0.58; --duration: 32s; --delay: -18s; --scale: 0.66; --lift: 12px;"></div>
    <div class="bird" style="--top: 43vh; --size: 36px; --opacity: 0.60; --duration: 30s; --delay: -24s; --scale: 0.74; --lift: -8px;"></div>
    <div class="bird" style="--top: 10vh; --size: 28px; --opacity: 0.54; --duration: 36s; --delay: -29s; --scale: 0.58; --lift: 8px;"></div>
</div>

<div class="welcome-screen" aria-hidden="true">
    <div class="welcome-inner">
        <div class="welcome-word welcome-hello">
            <div>
                <strong>Hello</strong>
                <span>Welcome back</span>
            </div>
        </div>
        <div class="welcome-word welcome-access">
            <div>
                <strong>heySiri</strong>
                <span>Team access</span>
            </div>
        </div>
    </div>
</div>

<main class="login-page">
    <section class="login-card">
        <div class="brand">
            <h1>heySiri</h1>
            <p>Team access</p>
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label>Name</label>
                <input type="text" name="name" placeholder="Name" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </section>
</main>
</body>
</html>
